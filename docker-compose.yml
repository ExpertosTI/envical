# ── envical — Docker Swarm + Traefik ─────────────────────────
#  Stack:       envios
#  Domain:      ${DOMAIN:-envios.renace.tech}
#  Network:     RenaceNet (overlay externa)
#  Entrypoints: web (:80), websecure (:443)
#  Cert:        letsencryptresolver

services:
  web:
    image: envical:latest
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - RenaceNet
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        order: start-first
        parallelism: 1
        failure_action: rollback
      resources:
        limits:
          cpus: "0.50"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 24M
      labels:
        # ── Traefik base ────────────────────────────────────
        - traefik.enable=true
        - traefik.docker.network=RenaceNet
        - traefik.constraint-label=traefik-public

        # ── HTTP → HTTPS ────────────────────────────────────
        - traefik.http.routers.envical-http.rule=Host(`${DOMAIN:-envios.renace.tech}`)
        - traefik.http.routers.envical-http.entrypoints=web
        - traefik.http.routers.envical-http.middlewares=envical-redirect-https

        # ── HTTPS ───────────────────────────────────────────
        - traefik.http.routers.envical.rule=Host(`${DOMAIN:-envios.renace.tech}`)
        - traefik.http.routers.envical.entrypoints=websecure
        - traefik.http.routers.envical.tls=true
        - traefik.http.routers.envical.tls.certresolver=letsencryptresolver
        - traefik.http.routers.envical.service=envical-svc
        - traefik.http.routers.envical.middlewares=envical-security

        # ── Service ─────────────────────────────────────────
        - traefik.http.services.envical-svc.loadbalancer.server.port=80
        - traefik.http.services.envical-svc.loadbalancer.healthcheck.path=/healthz
        - traefik.http.services.envical-svc.loadbalancer.healthcheck.interval=30s

        # ── Middlewares ─────────────────────────────────────
        - traefik.http.middlewares.envical-redirect-https.redirectscheme.scheme=https
        - traefik.http.middlewares.envical-redirect-https.redirectscheme.permanent=true

        - traefik.http.middlewares.envical-security.headers.stsSeconds=31536000
        - traefik.http.middlewares.envical-security.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.envical-security.headers.stsPreload=true
        - traefik.http.middlewares.envical-security.headers.contentTypeNosniff=true
        - traefik.http.middlewares.envical-security.headers.frameDeny=true
        - traefik.http.middlewares.envical-security.headers.referrerPolicy=strict-origin-when-cross-origin

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  RenaceNet:
    external: true
