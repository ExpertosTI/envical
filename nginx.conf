# ── envical — nginx server block ─────────────────────────────
#  SPA estatica de Vite. Cache largo para assets con hash,
#  sin cache para el shell HTML. Cabeceras de seguridad + CSP.
#
#  Nota: nginx reemplaza (no fusiona) add_header por bloque, por
#  eso cada `location` que sirve contenido declara su set completo.

map $sent_http_content_type $expires_static {
    default                 off;
    text/css                max;
    application/javascript  max;
    image/svg+xml           max;
    image/png               max;
    image/x-icon            max;
    font/woff2              max;
}

server {
    listen      80 default_server;
    listen      [::]:80 default_server;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    server_tokens off;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    # Limites defensivos
    client_max_body_size 1m;
    client_body_timeout  10s;
    client_header_timeout 10s;

    # Compresion
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml font/woff2;

    # Health endpoint (Traefik + Docker)
    location = /healthz {
        access_log   off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location = /robots.txt {
        access_log   off;
        default_type text/plain;
        return 200 "User-agent: *\nDisallow:\n";
    }

    # Assets con hash en el nombre — cache inmutable de un ano
    location /assets/ {
        access_log off;
        expires    $expires_static;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files  $uri =404;
    }

    # Shell HTML y resto de rutas — sin cache + seguridad completa
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; manifest-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" always;
        try_files $uri /index.html;
    }
}
